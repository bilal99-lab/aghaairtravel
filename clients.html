<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients - AAT Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Portal CSS -->
    <link rel="stylesheet" href="css/portal.css">
</head>

<body>

    <div class="app-layout">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-brand">
                AAT Portal
            </div>
            <div class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="new-ticket.html" class="nav-item"><i class="fas fa-ticket-alt"></i> New Ticket</a>
                <a href="umrah-entry.html" class="nav-item"><i class="fas fa-kaaba"></i> Umrah Entry</a>
                <a href="clients.html" class="nav-item active"><i class="fas fa-users"></i> Clients</a>
                <a href="ledger.html" class="nav-item"><i class="fas fa-book"></i> Ledger</a>
                <a href="expenses.html" class="nav-item"><i class="fas fa-receipt"></i> Expenses</a>
                <a href="reports.html" class="nav-item"><i class="fas fa-chart-line"></i> Reports</a>

                <a href="login.html" class="nav-item nav-logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-wrapper">

            <!-- Topbar -->
            <div class="topbar">
                <div class="page-title">Client Directory</div>
                <div class="user-profile">
                    <span class="avatar">A</span>
                    <span>Admin User</span>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area">
                <div class="card">
                    <div class="section-header">
                        <h3>All Clients</h3>
                        <button class="btn"><i class="fas fa-plus"></i> Add New Client</button>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Phone</th>
                                    <th>Passport</th>
                                    <th>Total Purchases</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="clientsTableBody">
                                <tr>
                                    <td>Usman Ali</td>
                                    <td>0300-1234567</td>
                                    <td>usman@example.com</td>
                                    <td>Rs 450,000</td>
                                    <td><span class="status-badge bg-success-light">Active</span></td>
                                </tr>
                                <tr>
                                    <td>Salman Khan</td>
                                    <td>0333-7654321</td>
                                    <td>salman@example.com</td>
                                    <td>Rs 1,200,000</td>
                                    <td><span class="status-badge bg-success-light">Active</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const tableBody = document.getElementById("clientsTableBody");
            let clients = JSON.parse(localStorage.getItem("aat_clients")) || [];

            if (clients.length > 0) {
                tableBody.innerHTML = ""; // Clear mock data
                clients.forEach(c => {
                    tableBody.innerHTML += `
                        <tr>
                            <td>${c.name}</td>
                            <td>${c.phone}</td>
                            <td>${c.passport || '-'}</td>
                            <td>Rs ${c.totalPurchases.toLocaleString()}</td>
                            <td><span class="status-badge bg-success-light">${c.status || 'Active'}</span></td>
                        </tr>
                    `;
                });
            }
        });
    </script>
</body>

</html>
